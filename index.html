<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Reviews</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Movie Reviews</h1>

    <table id="movies-table">
        <thead>
            <tr>
                <th>Title</th>
                <th>Genre</th>
                <th>Director</th>
                <th>Year</th>
            </tr>
        </thead>
        <tbody id="movies-body">
            <!-- filled in by js -->
        </tbody>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // connect to supabase
        const SUPABASE_URL = 'https://lbqqcuthngmphadsvjnk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxicXFjdXRobmdtcGhhZHN2am5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MDc2MzIsImV4cCI6MjA4NjM4MzYzMn0.kIVJIgGZsT4h20tM07gObaxsQ0QwLsdRgHjTJsDwsBw';
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadMovies() {
            // fetch movies with genre and director names
            const { data, error } = await client
                .from('movies')
                .select('movie_id, title, release_year, genres(name), directors(name)');

            if (error) {
                console.log('Error loading movies:', error);
                return;
            }

            const tbody = document.getElementById('movies-body');

            for (let i = 0; i < data.length; i++) {
                const movie = data[i];
                const row = document.createElement('tr');
                row.style.cursor = 'pointer';

                row.innerHTML = `
                    <td>${movie.title}</td>
                    <td>${movie.genres.name}</td>
                    <td>${movie.directors.name}</td>
                    <td>${movie.release_year}</td>
                `;

                // click to show/hide reviews
                row.addEventListener('click', function () {
                    toggleReviews(movie.movie_id, row);
                });

                tbody.appendChild(row);
            }
        }

        // show or hide reviews for a movie
        async function toggleReviews(movieId, row) {
            // if reviews row already exists, just toggle it
            const nextRow = row.nextElementSibling;
            if (nextRow && nextRow.classList.contains('reviews-row')) {
                nextRow.remove();
                return;
            }

            // fetch reviews for this movie
            const { data, error } = await client
                .from('reviews')
                .select('reviewer_name, rating, comment, created_at')
                .eq('movie_id', movieId)
                .order('created_at', { ascending: false });

            if (error) {
                console.log('Error loading reviews:', error);
                return;
            }

            // create a new row to hold the reviews
            const reviewsRow = document.createElement('tr');
            reviewsRow.classList.add('reviews-row');

            const cell = document.createElement('td');
            cell.colSpan = 4;

            if (data.length === 0) {
                cell.innerHTML = '<p class="no-reviews">No reviews yet.</p>';
            } else {
                let html = '<div class="reviews-list">';
                for (let i = 0; i < data.length; i++) {
                    const r = data[i];
                    html += `
                        <div class="review">
                            <strong>${r.reviewer_name}</strong> - ${r.rating}/5
                            <p>${r.comment}</p>
                        </div>
                    `;
                }
                html += '</div>';
                cell.innerHTML = html;
            }

            reviewsRow.appendChild(cell);
            row.after(reviewsRow);
        }

        loadMovies();
    </script>

</body>
</html>
