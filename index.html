<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV -->

<nav class="nav-bar">
  <a href="#">Home</a>
</nav>

<h1>Movie App</h1>

<h1>Movie App</h1>

<button onclick="toggleDarkMode()">Toggle Dark Mode</button>

<input 
  type="text" 
  id="search" 
  placeholder="Search movies..." 
  oninput="loadMovies()"
>

<label for="sort">Sort by:</label>
<select id="sort" onchange="loadMovies()">
  <option value="title-asc">Title (A–Z)</option>
  <option value="title-desc">Title (Z–A)</option>
  <option value="year-asc">Year (Oldest)</option>
  <option value="year-desc">Year (Newest)</option>
</select>

<!-- ADD MOVIE -->

<h2>Add Movie</h2>
<input type="text" id="title" placeholder="Title">
<input type="number" id="year" placeholder="Year">
<button onclick="addMovie()">Add</button>

<hr>

<!-- MOVIE TABLE -->

<table>
  <thead>
    <tr>
      <th>Title</th>
      <th>Genre</th>
      <th>Director</th>
      <th>Year</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="movies-body"></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

 const SUPABASE_URL = 'https://lbqqcuthngmphadsvjnk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxicXFjdXRobmdtcGhhZHN2am5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MDc2MzIsImV4cCI6MjA4NjM4MzYzMn0.kIVJIgGZsT4h20tM07gObaxsQ0QwLsdRgHjTJsDwsBw';
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


// LOAD MOVIES (READ)
async function loadMovies() {
  const searchValue = document.getElementById("search")?.value || "";
  const sortValue = document.getElementById("sort")?.value || "title-asc";
  let query = client
  .from("movies")
  .select("movie_id, title, release_year, genres(name), directors(name)");
  if (searchValue) {
  query = query.ilike("title", `%${searchValue}%`);
}

if (sortValue === "title-asc") {
  query = query.order("title", { ascending: true });
} else if (sortValue === "title-desc") {
  query = query.order("title", { ascending: false });
} else if (sortValue === "year-asc") {
  query = query.order("release_year", { ascending: true });
} else if (sortValue === "year-desc") {
  query = query.order("release_year", { ascending: false });
}

const { data } = await query;

  const tbody = document.getElementById("movies-body");
  tbody.innerHTML = "";

  data.forEach(movie => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${movie.title}</td>
      <td>${movie.genres?.name || ""}</td>
      <td>${movie.directors?.name || ""}</td>
      <td>${movie.release_year}</td>
      <td>
        <button onclick="editMovie(${movie.movie_id}, '${movie.title}')">Edit</button>
        <button onclick="deleteMovie(${movie.movie_id})">Delete</button>
      </td>
    `;

    // CLICK → show reviews
    row.addEventListener("click", function (e) {
      // stop click if button pressed
      if (e.target.tagName === "BUTTON") return;
      toggleReviews(movie.movie_id, row);
    });

    tbody.appendChild(row);
  });
}

// CREATE
async function addMovie() {
  const title = document.getElementById("title").value;
  const year = document.getElementById("year").value;

  await client.from("movies").insert([
    { title: title, release_year: year }
  ]);

  loadMovies();
}

// DELETE
async function deleteMovie(id) {
  await client.from("movies").delete().eq("movie_id", id);
  loadMovies();
}


async function editMovie(id, oldTitle) {
  const newTitle = prompt("New title:", oldTitle);
  if (!newTitle) return;

  await client.from("movies")
    .update({ title: newTitle })
    .eq("movie_id", id);

  loadMovies();
}

// SHOW REVIEWS
async function toggleReviews(movieId, row) {

  const nextRow = row.nextElementSibling;

  if (nextRow && nextRow.classList.contains("reviews-row")) {
    nextRow.remove();
    return;
  }

  const { data } = await client
    .from("reviews")
    .select("reviewer_name, rating, comment")
    .eq("movie_id", movieId);

  const reviewsRow = document.createElement("tr");
  reviewsRow.classList.add("reviews-row");

  const cell = document.createElement("td");
  cell.colSpan = 5;

  if (data.length === 0) {
    cell.innerHTML = "No reviews yet";
  } else {
    let html = "";
    data.forEach(r => {
      html += `
        <p><strong>${r.reviewer_name}</strong> (${r.rating}/5): ${r.comment}</p>
      `;
    });
    cell.innerHTML = html;
  }

  reviewsRow.appendChild(cell);
  row.after(reviewsRow);
}

function toggleDarkMode() {
  document.body.classList.toggle("dark-mode");
}

// RUN
loadMovies();
// RUN
loadMovies();

</script>

</body>
</html>
